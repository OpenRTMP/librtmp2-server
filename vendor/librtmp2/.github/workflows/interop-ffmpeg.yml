name: Interop (ffmpeg publish)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  interop-ffmpeg:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install ffmpeg
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

    - name: Interop — publish from real ffmpeg
      run: ./tests/interop/ffmpeg_interop.sh

    - name: Interop — Enhanced-RTMP (HEVC + AV1 FourCC) ingest
      run: ./tests/interop/enhanced_rtmp_interop.sh
