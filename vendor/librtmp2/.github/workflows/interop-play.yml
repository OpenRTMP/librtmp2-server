name: Interop (play / pull)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  interop-play:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install ffmpeg
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

    - name: Download mediamtx (real RTMP server)
      run: |
        ver=v1.9.3
        curl -fsSL "https://github.com/bluenviron/mediamtx/releases/download/${ver}/mediamtx_${ver}_linux_amd64.tar.gz" \
          | tar xz -C "$RUNNER_TEMP" mediamtx
        echo "MEDIAMTX=$RUNNER_TEMP/mediamtx" >> "$GITHUB_ENV"

    - name: Interop — play (pull) from real server
      run: ./tests/interop/play_interop.sh
