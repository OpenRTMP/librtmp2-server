[package]
name = "librtmp2"
version = "0.1.0"
edition = "2021"
authors = ["OpenRTMP Contributors"]
description = "A Rust port of librtmp2 — RTMP/RTMPS protocol library"
license = "MIT"
repository = "https://github.com/openrtmp/librtmp2"

[lib]
name = "librtmp2"
crate-type = ["cdylib", "staticlib", "lib"]

[features]
default = ["tls"]
tls = ["openssl"]

[dependencies]
libc = "0.2"
thiserror = "2"
openssl = { version = "0.10.70", optional = true }
parking_lot = "0.12"

[build-dependencies]
cc = "1"
