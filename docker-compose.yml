services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/OpenRTMP/librtmp2-server:latest
    container_name: librtmp2-server
    restart: unless-stopped
    environment:
      - LRTMP2_HTTP_BIND=0.0.0.0:8080
      - LRTMP2_RTMP_BIND=0.0.0.0:1935
      - LRTMP2_LOG_LEVEL=2
      - LRTMP2_DB=/data/server.db
    volumes:
      - server-data:/data
    ports:
      - "1935:1935"   # RTMP ingest/play
      - "8080:8080"   # HTTP API + health
    networks:
      - openrtmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  server-data:

networks:
  openrtmp:
    driver: bridge
