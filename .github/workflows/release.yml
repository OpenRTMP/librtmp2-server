name: Release

# Builds and packages tagged releases. Push a tag like `v0.1.0` to produce
# a prebuilt binary tarball and a GitHub Release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  verify:
    name: verify before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake libsqlite3-dev

      - name: Clone librtmp2
        run: git clone --depth 1 https://github.com/AlexanderWagnerDev/librtmp2.git ../librtmp2

      - name: Build librtmp2
        run: make -C ../librtmp2 release

      - name: Build (release)
        run: make release

      - name: Run unit tests
        run: make test

      - name: Run unit tests (ASan)
        run: make clean && make asan

  package:
    name: build & package
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake libsqlite3-dev

      - name: Clone librtmp2
        run: git clone --depth 1 https://github.com/AlexanderWagnerDev/librtmp2.git ../librtmp2

      - name: Build librtmp2
        run: make -C ../librtmp2 release

      - name: Resolve version
        id: ver
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${REF#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$REF" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: make release

      - name: Stage install tree
        run: |
          mkdir -p dist/librtmp2-server-${{ steps.ver.outputs.version }}
          cp librtmp2-server dist/librtmp2-server-${{ steps.ver.outputs.version }}/
          cp config.example.json dist/librtmp2-server-${{ steps.ver.outputs.version }}/config.json

      - name: Create binary tarball
        run: |
          cd dist
          tar czf "librtmp2-server-${{ steps.ver.outputs.version }}-linux-x86_64.tar.gz" \
            "librtmp2-server-${{ steps.ver.outputs.version }}"
          sha256sum "librtmp2-server-${{ steps.ver.outputs.version }}-linux-x86_64.tar.gz" \
            > "librtmp2-server-${{ steps.ver.outputs.version }}-linux-x86_64.tar.gz.sha256"

      - name: Create source tarball
        run: |
          git archive --format=tar.gz \
            --prefix="librtmp2-server-${{ steps.ver.outputs.version }}/" \
            -o "dist/librtmp2-server-${{ steps.ver.outputs.version }}-src.tar.gz" HEAD
          cd dist
          sha256sum "librtmp2-server-${{ steps.ver.outputs.version }}-src.tar.gz" \
            > "librtmp2-server-${{ steps.ver.outputs.version }}-src.tar.gz.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: librtmp2-server-${{ steps.ver.outputs.version }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: librtmp2-server ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
