name: Apply crates.io librtmp2 0.4.0 migration

on:
  push:
    branches:
      - chore/librtmp2-0.4.0
    paths:
      - .github/workflows/apply-librtmp2-crates-0.4.0.yml

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: chore/librtmp2-0.4.0
          fetch-depth: 0

      - name: Install Rust 1.95
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup override set 1.95.0

      - name: Switch librtmp2 to crates.io
        shell: python
        run: |
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"expected text not found in {path}")
              file.write_text(text.replace(old, new, 1))

          replace_exact(
              "Cargo.toml",
              '# Until librtmp2 0.4.0 is published on crates.io, pin the exact current PR #128 head for reproducible builds.\nlibrtmp2 = { version = "0.4.0", git = "https://github.com/OpenRTMP/librtmp2", rev = "fea7e2e9d472e651b14be23c9feb63ca47bb3a5b", features = ["tls"] }',
              'librtmp2 = { version = "0.4.0", features = ["tls"] }',
          )

          replace_exact(
              "Cargo.lock",
              'source = "git+https://github.com/OpenRTMP/librtmp2?rev=fea7e2e9d472e651b14be23c9feb63ca47bb3a5b#fea7e2e9d472e651b14be23c9feb63ca47bb3a5b"\ndependencies = [',
              'source = "registry+https://github.com/rust-lang/crates.io-index"\nchecksum = "1cedd2ff740b4512de3108f3e4b7c797163854f2ee914c8ff16e67dd450f182b"\ndependencies = [',
          )

          replace_exact(
              "AGENTS.md",
              '- **Dependency source:** `librtmp2 = "0.4.0"` is pinned to the current PR #128 head `fea7e2e` until the crate is on crates.io. After merge + publish, switch `Cargo.toml` to a registry-only pin (`librtmp2 = { version = "0.4.0", features = ["tls"] }`) and refresh `Cargo.lock`. It does **not** use the sibling `../librtmp2` checkout unless you add a `[patch]` override locally.',
              '- **Dependency source:** `librtmp2 = "0.4.0"` resolves from crates.io with the `tls` feature enabled. It does **not** use the sibling `../librtmp2` checkout unless you add a `[patch]` override locally.',
          )

          replace_exact(
              "CHANGELOG.md",
              '- Bump the pinned `librtmp2` dependency to **0.4.0** (E-RTMP v2 connect negotiation,\n  multitrack relay, Enhanced-RTMP init-cache/onMetaData replay, legacy pause/seek).\n  Until `0.4.0` is on crates.io the lockfile resolves it from git\n  (`OpenRTMP/librtmp2` @ `fea7e2e`); switch back to a crates.io version pin after\n  release.',
              '- Bump the `librtmp2` dependency to the crates.io release **0.4.0** (E-RTMP v2 connect negotiation,\n  multitrack relay, Enhanced-RTMP init-cache/onMetaData replay, legacy pause/seek).',
          )

          replace_exact(
              "README.md",
              '`librtmp2` 0.4.0 is not on crates.io yet. Until it is published, this repo pins the current commit `fea7e2e` from librtmp2 PR #128 (see `Cargo.toml`) so builds remain reproducible. After merge and crates.io release, change the dependency to a registry-only line:\n\n```toml\nlibrtmp2 = { version = "0.4.0", features = ["tls"] }\n```\n\nThen run `cargo update -p librtmp2` and commit the updated lockfile.',
              '`librtmp2-server` uses the published `librtmp2` 0.4.0 release from crates.io:\n\n```toml\nlibrtmp2 = { version = "0.4.0", features = ["tls"] }\n```',
          )

      - name: Verify locked registry build
        run: cargo check --locked

      - name: Commit migration and remove helper workflow
        run: |
          rm .github/workflows/apply-librtmp2-crates-0.4.0.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock AGENTS.md CHANGELOG.md README.md .github/workflows/apply-librtmp2-crates-0.4.0.yml
          git commit -m "chore: use crates.io librtmp2 0.4.0"
          git push origin HEAD:chore/librtmp2-0.4.0
