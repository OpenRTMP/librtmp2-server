name: Apply PR 82 dependency fix

on:
  push:
    branches:
      - chore/librtmp2-0.4.0
    paths:
      - Cargo.toml
      - scripts/apply_pr82_dependency_fix.py
      - .github/workflows/apply-pr82-dependency-fix.yml

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: chore/librtmp2-0.4.0
          fetch-depth: 0

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Update documentation
        run: python3 scripts/apply_pr82_dependency_fix.py

      - name: Regenerate lockfile
        run: |
          cargo update -p librtmp2
          grep -F 'ad021f97631cd2033abaee43e711bc406ca10c17' Cargo.lock

      - name: Format check
        run: cargo fmt --all --check

      - name: Unit tests
        run: cargo test

      - name: E2E tests
        run: cargo test --features test-support --test rtmp_http_e2e -- --test-threads=1

      - name: Compile benchmarks
        run: cargo check --benches --features test-support

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Commit validated changes
        run: |
          rm scripts/apply_pr82_dependency_fix.py
          rm .github/workflows/apply-pr82-dependency-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: pin server to validated librtmp2 revision"
          git push origin HEAD:chore/librtmp2-0.4.0
