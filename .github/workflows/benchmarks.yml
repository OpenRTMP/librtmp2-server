name: Benchmarks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  bench:
    name: cargo bench
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run HTTP API benchmarks
        run: |
          cargo bench --features test-support --bench http_api -- --sample-size 20 --test-threads 1 --noplot 2>&1 | tee bench-http-api.txt

      - name: Upload benchmark output
        uses: actions/upload-artifact@v4
        with:
          name: librtmp2-server-benchmarks
          path: bench-*.txt
