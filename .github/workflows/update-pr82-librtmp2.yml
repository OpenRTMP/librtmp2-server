name: Update PR 82 librtmp2 dependency

on:
  push:
    branches:
      - chore/librtmp2-0.4.0
    paths:
      - .github/workflows/update-pr82-librtmp2.yml

permissions:
  contents: write

jobs:
  update-dependency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chore/librtmp2-0.4.0
          fetch-depth: 0

      - name: Refresh librtmp2 source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export LATEST_REV="$(gh api repos/OpenRTMP/librtmp2/pulls/128 --jq .head.sha)"

          if python - <<'PY'
          import json
          import urllib.error
          import urllib.request

          req = urllib.request.Request(
              "https://crates.io/api/v1/crates/librtmp2/0.4.0",
              headers={"User-Agent": "OpenRTMP/librtmp2-server"},
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as response:
                  data = json.load(response)
          except urllib.error.HTTPError as error:
              if error.code == 404:
                  raise SystemExit(1)
              raise
          raise SystemExit(0 if data.get("version", {}).get("num") == "0.4.0" else 1)
          PY
          then
            export PUBLISHED=1
          else
            export PUBLISHED=0
          fi

          python - <<'PY'
          import os
          import re
          from pathlib import Path

          latest = os.environ["LATEST_REV"]
          short = latest[:7]
          published = os.environ["PUBLISHED"] == "1"

          cargo = Path("Cargo.toml")
          cargo_text = cargo.read_text()
          dep_re = re.compile(
              r'(?:# Until librtmp2 0\.4\.0 is published on crates\.io, pin[^\n]*\n'
              r'(?:# [^\n]*\n)?)?'
              r'librtmp2 = \{ version = "0\.4\.0", git = "https://github\.com/OpenRTMP/librtmp2", rev = "[0-9a-f]{40}", features = \["tls"\] \}'
          )
          if published:
              dep = 'librtmp2 = { version = "0.4.0", features = ["tls"] }'
          else:
              dep = (
                  '# Until librtmp2 0.4.0 is published on crates.io, pin the exact current PR #128 head.\n'
                  f'librtmp2 = {{ version = "0.4.0", git = "https://github.com/OpenRTMP/librtmp2", rev = "{latest}", features = ["tls"] }}'
              )
          cargo_text, n = dep_re.subn(dep, cargo_text, count=1)
          if n != 1:
              raise SystemExit("Cargo.toml dependency entry was not updated")
          cargo.write_text(cargo_text)

          if published:
              replacements = {
                  "AGENTS.md": (
                      re.compile(r'- \*\*Dependency source:\*\*.*\n'),
                      '- **Dependency source:** `librtmp2 = "0.4.0"` resolves from crates.io with the `tls` feature. It does **not** use the sibling `../librtmp2` checkout unless you add a `[patch]` override locally.\n',
                  ),
                  "CHANGELOG.md": (
                      re.compile(r'  Until `0\.4\.0` is on crates\.io the lockfile resolves it from git\n  \(`OpenRTMP/librtmp2` @ `[0-9a-f]{7}`\); switch back to a crates\.io version pin after\n  release\.'),
                      '  The dependency now resolves from the published crates.io release.',
                  ),
                  "README.md": (
                      re.compile(r'`librtmp2` 0\.4\.0 is not on crates\.io yet\..*?Then run `cargo update -p librtmp2` and commit the updated lockfile\.', re.S),
                      '`librtmp2` 0.4.0 is resolved from crates.io with the `tls` feature.',
                  ),
              }
              for name, (pattern, replacement) in replacements.items():
                  path = Path(name)
                  text, n = pattern.subn(replacement, path.read_text(), count=1)
                  if n != 1:
                      raise SystemExit(f"{name} dependency documentation was not updated")
                  path.write_text(text)
          else:
              for name in ("AGENTS.md", "CHANGELOG.md", "README.md"):
                  path = Path(name)
                  text = path.read_text()
                  text = re.sub(r'`[0-9a-f]{7}`(?=[^\n]*(?:PR #128|crates\.io|lockfile|commit))', f'`{short}`', text)
                  text = text.replace("validated commit", "current commit")
                  text = text.replace("pinned to validated git commit", "pinned to the current PR #128 head")
                  path.write_text(text)

              lock = Path("Cargo.lock")
              lock_text = lock.read_text()
              lock_text, n = re.subn(
                  r'(git\+https://github\.com/OpenRTMP/librtmp2\?rev=)[0-9a-f]{40}(#[0-9a-f]{40})',
                  rf'\g<1>{latest}#{latest}',
                  lock_text,
                  count=1,
              )
              if n != 1:
                  raise SystemExit("Cargo.lock librtmp2 source was not updated")
              lock.write_text(lock_text)
          PY

          if [ "$PUBLISHED" = 1 ]; then
            rustup update stable
            cargo update -p librtmp2
          fi

          grep -F "$LATEST_REV" Cargo.toml Cargo.lock || [ "$PUBLISHED" = 1 ]

      - name: Commit result and remove helper
        run: |
          set -euo pipefail
          rm .github/workflows/update-pr82-librtmp2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock AGENTS.md CHANGELOG.md README.md .github/workflows/update-pr82-librtmp2.yml
          git commit -m "fix: refresh librtmp2 dependency pin"
          git push origin HEAD:chore/librtmp2-0.4.0
