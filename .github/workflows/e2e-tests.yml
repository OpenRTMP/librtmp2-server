name: E2E Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    name: RTMP + HTTP integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run E2E integration tests
        run: cargo test --verbose --features test-support --test rtmp_http_e2e -- --test-threads=1
